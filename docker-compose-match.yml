version: "3.9"
services:
  hiking-match:
    build: ./hiking-match-service/
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://hiking-match-db:5432/hiking-match
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - hiking-match-db
    networks:
      - hiking_match_network

  hiking-match-db:
    image: postgres
    container_name: hiking-match-db
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: hiking-match
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 5s
      retries: 5
    volumes:
      - hiking_match_data:/var/lib/postgresql/data
    networks:
      - hiking_match_network

volumes:
  hiking_match_data:

networks:
  hiking_match_network: